<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FPT Video - Đăng nhập</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#dadada",
                        "on-secondary-container": "#656464",
                        "inverse-on-surface": "#f0f1f1",
                        "on-tertiary-fixed": "#1b1c1c",
                        "surface": "#f9f9f9",
                        "on-surface-variant": "#414754",
                        "on-secondary-fixed-variant": "#474646",
                        "secondary-container": "#e5e2e1",
                        "outline": "#727786",
                        "on-tertiary-container": "#ffffff",
                        "surface-container-highest": "#e2e2e2",
                        "on-primary-fixed-variant": "#004397",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "surface-container-high": "#e8e8e8",
                        "primary-container": "#0070f3",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#aec6ff",
                        "surface-container": "#eeeeee",
                        "inverse-primary": "#aec6ff",
                        "on-secondary-fixed": "#1c1b1b",
                        "surface-container-low": "#f3f3f3",
                        "secondary-fixed-dim": "#c8c6c5",
                        "on-tertiary-fixed-variant": "#464747",
                        "primary-fixed": "#d8e2ff",
                        "on-tertiary": "#ffffff",
                        "on-surface": "#1a1c1c",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed": "#e5e2e1",
                        "inverse-surface": "#2f3131",
                        "surface-bright": "#f9f9f9",
                        "tertiary": "#5d5d5d",
                        "surface-tint": "#0059c5",
                        "secondary": "#5f5e5e",
                        "primary": "#0058c3",
                        "on-background": "#1a1c1c",
                        "error": "#ba1a1a",
                        "on-primary-container": "#ffffff",
                        "on-primary-fixed": "#001a43",
                        "background": "#f9f9f9",
                        "tertiary-container": "#767676",
                        "outline-variant": "#c1c6d7",
                        "tertiary-fixed": "#e4e2e2",
                        "tertiary-fixed-dim": "#c7c6c6",
                        "surface-variant": "#e2e2e2"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "gutter": "1.5rem",
                        "margin": "2rem",
                        "2xl": "4rem",
                        "lg": "1.5rem",
                        "max-width": "1200px",
                        "sm": "0.5rem",
                        "md": "1rem",
                        "xl": "2.5rem",
                        "xs": "0.25rem"
                    },
                    "fontFamily": {
                        "headline-lg": ["Geist"],
                        "body-sm": ["Geist"],
                        "label-sm": ["Geist"],
                        "body-lg": ["Geist"],
                        "display": ["Geist"],
                        "headline-md": ["Geist"],
                        "label-md": ["Geist"],
                        "headline-lg-mobile": ["Geist"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.03em", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "body-lg": ["16px", {"lineHeight": "1.6", "letterSpacing": "-0.01em", "fontWeight": "400"}],
                        "display": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700"}],
                        "headline-md": ["20px", {"lineHeight": "1.4", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "label-md": ["13px", {"lineHeight": "1.2", "letterSpacing": "0.01em", "fontWeight": "500"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Geist', sans-serif;
            background-color: #FAFAFA; /* Level 0 Background */
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Focus styles override */
        .input-focus:focus {
            border-color: #0070F3 !important;
            box-shadow: none !important;
            outline: none !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center p-gutter">
<!-- Auth Card -->
<main class="w-full max-w-md bg-surface-container-lowest border border-[#EAEAEA] rounded-[6px] p-xl flex flex-col gap-xl">
<!-- Header -->
<header class="flex flex-col items-center gap-sm text-center">
<h1 class="text-on-surface font-headline-lg text-headline-lg" style="color: #111111;">Đăng nhập</h1>
<p class="text-on-surface-variant font-body-sm text-body-sm">Vui lòng đăng nhập để tiếp tục sử dụng FPT Video</p>
</header>
<!-- Form -->
<form action="#" class="flex flex-col gap-md" method="POST">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="text-on-surface font-label-sm text-label-sm" for="email">Email hoặc Số điện thoại</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size: 20px;">mail</span>
<input class="input-focus w-full h-[40px] pl-10 pr-3 bg-surface-container-lowest border border-[#EAEAEA] rounded-[6px] text-on-surface font-body-sm text-body-sm placeholder:text-outline transition-colors" id="email" name="email" placeholder="Nhập email hoặc SĐT" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="text-on-surface font-label-sm text-label-sm" for="password">Mật khẩu</label>
<a class="text-primary-container hover:text-primary transition-colors font-label-sm text-label-sm" href="#">Quên mật khẩu?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size: 20px;">lock</span>
<input class="input-focus w-full h-[40px] pl-10 pr-10 bg-surface-container-lowest border border-[#EAEAEA] rounded-[6px] text-on-surface font-body-sm text-body-sm placeholder:text-outline transition-colors" id="password" name="password" placeholder="Nhập mật khẩu" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</button>
</div>
</div>
<!-- Options -->
<div class="flex items-center gap-sm mt-xs">
<input class="w-4 h-4 rounded-[4px] border-[#EAEAEA] text-primary-container focus:ring-primary-container" id="remember" name="remember" type="checkbox"/>
<label class="text-on-surface-variant font-body-sm text-body-sm cursor-pointer" for="remember">Ghi nhớ đăng nhập</label>
</div>
<!-- Submit Button -->
<button class="mt-sm w-full h-[40px] bg-[#0070F3] hover:bg-[#0058c3] text-on-primary font-label-md text-label-md rounded-[6px] transition-colors flex items-center justify-center gap-sm" type="submit">
<span>Đăng nhập</span>
<span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-md">
<div class="h-[1px] flex-1 bg-[#EAEAEA]"></div>
<span class="text-on-surface-variant font-label-sm text-label-sm uppercase tracking-wider">Hoặc</span>
<div class="h-[1px] flex-1 bg-[#EAEAEA]"></div>
</div>
<!-- SSO Options -->
<div class="flex flex-col gap-sm">
<button class="w-full h-[40px] bg-surface-container-lowest border border-[#EAEAEA] hover:bg-[#FAFAFA] text-[#111111] font-label-md text-label-md rounded-[6px] transition-colors flex items-center justify-center gap-sm" type="button">
<!-- SVG Icon for Google, simplified to material icon for design system consistency -->
<span class="material-symbols-outlined" style="font-size: 18px;">account_circle</span>
                Đăng nhập với Google
            </button>
<button class="w-full h-[40px] bg-surface-container-lowest border border-[#EAEAEA] hover:bg-[#FAFAFA] text-[#111111] font-label-md text-label-md rounded-[6px] transition-colors flex items-center justify-center gap-sm" type="button">
<span class="material-symbols-outlined" style="font-size: 18px;">business</span>
                Đăng nhập với FPT SSO
            </button>
</div>
<!-- Footer Links -->
<div class="text-center mt-xs">
<p class="text-on-surface-variant font-body-sm text-body-sm">
                Chưa có tài khoản? 
                <a class="text-primary-container hover:text-primary transition-colors font-label-md text-label-md ml-1" href="#">Đăng ký ngay</a>
</p>
</div>
</main>
<!-- Global Footer Minimal for Auth Page -->
<footer class="mt-2xl text-center">
<p class="text-on-surface-variant font-label-sm text-label-sm">© 2024 FPT Corporation. All rights reserved.</p>
<div class="flex justify-center gap-md mt-sm">
<a class="text-on-surface-variant hover:text-primary-container transition-colors font-label-sm text-label-sm" href="#">Privacy</a>
<a class="text-on-surface-variant hover:text-primary-container transition-colors font-label-sm text-label-sm" href="#">Terms</a>
<a class="text-on-surface-variant hover:text-primary-container transition-colors font-label-sm text-label-sm" href="#">Support</a>
</div>
</footer>
</body></html>
