<!DOCTYPE html>
<html>
<head>
    <title>WebSocket STOMP Test</title>
    <!-- Import thư viện SockJS và STOMP từ CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px;">
<h2>Thông báo thời gian thực (Realtime Notification)</h2>
<div id="status" style="color: gray; margin-bottom: 10px;">Đang kết nối...</div>
<div id="messages" style="border: 1px solid #ccc; padding: 15px; height: 250px; overflow-y: auto; background: #f9f9f9;"></div>

<script>
    // Kết nối tới WebSocket Endpoint của bạn
    var socket = new SockJS('http://localhost:8080/yubutu/ws');
    var stompClient = Stomp.over(socket);

    stompClient.connect({}, function (frame) {
        document.getElementById('status').innerText = 'Trạng thái: Đã kết nối thành công!';
        document.getElementById('status').style.color = 'green';

        // Subscribe lắng nghe kênh thông báo
        stompClient.subscribe('/notification/new-video', function (notification) {
            var messageDiv = document.getElementById('messages');
            messageDiv.innerHTML += '<p style="color: blue; border-bottom: 1px solid #eee; padding-bottom: 5px;">🔔 ' + notification.body + '</p>';
        });
    }, function(error) {
        document.getElementById('status').innerText = 'Trạng thái: Lỗi kết nối: ' + error;
        document.getElementById('status').style.color = 'red';
    });
</script>
</body>
</html>
